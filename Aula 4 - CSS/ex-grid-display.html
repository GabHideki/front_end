<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 4 - Exemplo Grid Display</title>
    <style>
        .container{
            display: grid;
            background-color: rgb(8, 155, 96);
            gap: 20px;
            grid-template-columns: repeat(3, 1fr);
            grid-auto-rows: 100px;
        }

        .item{
            background-color: beige;
        }

        .box1{
            grid-column-start: 3;
        }

        .box2{
            grid-column-start: span 2;
            grid-column-end: 4;
        }

        .box3{
            grid-column-start: 3;
            grid-row-start: 2;
        }

        .box4{
            grid-column-start: 1;
            grid-row-start: 3;
        }

        .box5{
            grid-column-start: 1;
            grid-row-start: span 3;
            grid-row-end: 3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item box1">ODS 1</div>
        <div class="item box2">ODS 2</div>
        <div class="item box3">ODS 3</div>
        <div class="item box4">ODS 4</div>
        <div class="item box5">ODS 5</div>
    </div>
</body>
</html>
