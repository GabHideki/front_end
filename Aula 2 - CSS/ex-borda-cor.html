<!DOCTYPE html>
      <html>
      <head>
            <style>
                  .dotted {
                        border: 10px cyan dotted;
                  }
                  .dashed {
                        border: dashed thick palevioletred;
                  }
                  .solid {
                        border-style: solid; 
                        border-width: 25px; 
                        border-radius: 20%;
                        border-color: green red;
                  }
                  .double {
                        border-style: double; 
                        border-width: medium; 
                        border-color: hsl(145, 89%, 26%);
                  }
                  .mix {
                        border-style: dotted dashed solid double;
                        border-color: #c2247e;
                  }
            </style>
      </head>
      <body>
            <h2>Exemplo de bordas</h2>
            <p class="dotted">Borda pontilhada.</p>
            <p class="dashed">Borda tracejada.</p>
            <p class="solid">Borda sólida.</p>
            <p class="double">Borda dupla.</p>
            <p class="mix">Bordas mistas.</p>
      </body>
</html>
