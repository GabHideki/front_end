<!DOCTYPE html>
<html>
    <head>
        <style>
            .dotted {border-style: dotted; border-width: thick;}
            .dashed {border-style: dashed; border-width: thick}
            .solid {border-style: solid; border-width: thick}
            .double {border-style: double; border-width: thick;}
            .hidden {border-style: hidden;}
            .mix {border-style: dotted dashed solid double; border-width: thick;}
        </style>
    </head>
    <body>
        <h2>Exemplo de bordas</h2>
        <p class="dotted">Borda pontilhada.</p>
        <p class="dashed">Borda tracejada.</p>
        <p class="solid">Borda sólida.</p>
        <p class="double">Borda dupla.</p>
        <p class="hidden">Borda oculta.</p>
        <p class="mix">Bordas mistas.</p>
    </body>
</html>
